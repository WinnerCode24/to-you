<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>สุขสันต์วันครบรอบแฟนนน 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:      #d4607a;
      --blush:     #f2c4ce;
      --gold:      #c9954c;
      --deep-rose: #8b2e45;
      --card-w: clamp(240px, 72vw, 320px);
      --card-h: clamp(330px, 54vh, 420px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; min-height: 100dvh; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 40%, #fde8f0 0%, #fdf0f8 40%, #f5e8f5 100%);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── petals ── */
    .petal {
      position: fixed;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes fall {
      0%   { opacity: 0; transform: translateY(-30px) rotate(0deg) scale(.6); }
      10%  { opacity: .8; }
      90%  { opacity: .5; }
      100% { opacity: 0; transform: translateY(110dvh) rotate(360deg) scale(1); }
    }

    /* ── scene ── */
    .scene {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 4vw, 1.8rem);
      padding: 1rem;
    }

    .label-top {
      font-style: italic;
      font-size: clamp(.8rem, 3.5vw, 1rem);
      letter-spacing: .22em;
      color: var(--rose);
      opacity: .75;
      text-transform: uppercase;
      animation: fadeUp .9s ease both;
    }

    /* ══ FLIP CARD ══ */
    .flip-card {
      width: var(--card-w);
      height: var(--card-h);
      perspective: 1200px;
      cursor: pointer;
      animation: fadeUp 1s .15s ease both;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform .9s cubic-bezier(.4,.2,.2,1);
      transform-style: preserve-3d;
    }
    /* hover flip only on non-touch devices */
    @media (hover: hover) {
      .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      inset: 0;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: 1.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.4rem, 6vw, 2.4rem) clamp(1.2rem, 5vw, 2rem);
      gap: .7rem;
    }

    /* FRONT */
    .flip-card-front {
      background:
        radial-gradient(ellipse at 30% 20%, #fff0f4 0%, transparent 60%),
        linear-gradient(145deg, #fde8ef 0%, #f9d4df 55%, #f2c4ce 100%);
      border: 1.5px solid rgba(212,96,122,.25);
      box-shadow:
        0 20px 60px rgba(212,96,122,.22),
        0 4px 16px rgba(212,96,122,.14),
        inset 0 1px 0 rgba(255,255,255,.7);
      color: var(--deep-rose);
    }
    .flip-card-front::before,
    .flip-card-front::after {
      content: '✦';
      position: absolute;
      font-size: .85rem;
      color: var(--gold);
      opacity: .6;
    }
    .flip-card-front::before { top: 1.1rem; left: 1.3rem; }
    .flip-card-front::after  { bottom: 1.1rem; right: 1.3rem; }

    .front-month {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 14vw, 5rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--rose), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(212,96,122,.25));
    }
    .front-unit {
      font-style: italic;
      font-size: clamp(.85rem, 3.5vw, 1rem);
      letter-spacing: .18em;
      color: var(--rose);
      opacity: .8;
      margin-top: -.4rem;
    }
    .front-divider {
      width: 56px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: .2rem 0;
    }
    .front-emoji {
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.18); }
    }
    .front-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 4.5vw, 1.3rem);
      font-style: italic;
      color: var(--deep-rose);
      line-height: 1.4;
    }
    .front-sub {
      font-size: clamp(.7rem, 2.8vw, .85rem);
      letter-spacing: .14em;
      color: var(--rose);
      opacity: .65;
      text-transform: uppercase;
    }
    /* hint changes based on flip state */
    .front-hint {
      position: absolute;
      bottom: 1.2rem;
      font-size: clamp(.62rem, 2.5vw, .72rem);
      letter-spacing: .1em;
      color: var(--rose);
      opacity: .4;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: .3rem;
      transition: opacity .3s;
    }
    .front-hint::before,
    .front-hint::after { content: '—'; }

    /* BACK */
    .flip-card-back {
      background:
        radial-gradient(ellipse at 70% 80%, rgba(255,255,255,.12) 0%, transparent 55%),
        linear-gradient(145deg, #c9546a 0%, #a83050 50%, #7d1f38 100%);
      border: 1.5px solid rgba(255,255,255,.15);
      box-shadow:
        0 24px 64px rgba(139,46,69,.45),
        0 4px 20px rgba(139,46,69,.3),
        inset 0 1px 0 rgba(255,255,255,.2);
      color: #fff;
      transform: rotateY(180deg);
      gap: .9rem;
    }
    .back-ornament { font-size: 1.2rem; opacity: .55; letter-spacing: .5em; }
    .back-quote {
      font-family: 'Playfair Display', serif;
      font-size: clamp(.9rem, 3.8vw, 1.1rem);
      font-style: italic;
      line-height: 1.75;
      color: rgba(255,255,255,.92);
      padding: 0 .4rem;
    }
    .back-name {
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 300;
      letter-spacing: .22em;
      color: var(--blush);
    }
    .back-hearts { font-size: 1rem; letter-spacing: .4em; opacity: .7; }
    .back-sign {
      font-style: italic;
      font-size: clamp(.72rem, 3vw, .85rem);
      color: rgba(255,255,255,.45);
      letter-spacing: .12em;
    }

    .caption {
      font-style: italic;
      font-size: clamp(.78rem, 3vw, .92rem);
      letter-spacing: .1em;
      color: var(--rose);
      opacity: .55;
      animation: fadeUp 1.1s .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ══════════════════════════════
       MODAL — BOTTOM SHEET
    ══════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(60,5,20,.52);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-box {
      position: relative;
      width: 100%;
      max-width: 480px;
      height: min(88dvh, 560px);
      border-radius: 1.8rem 1.8rem 0 0;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(255,220,230,.1) 0%, transparent 50%),
        linear-gradient(170deg, #2d0a14 0%, #4a1020 60%, #3a0c1a 100%);
      border: 1px solid rgba(242,196,206,.15);
      border-bottom: none;
      box-shadow: 0 -16px 60px rgba(0,0,0,.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      transform: translateY(100%);
      transition: transform .42s cubic-bezier(.34,1.2,.64,1);
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }

    /* drag handle */
    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(242,196,206,.3);
      border-radius: 2px;
      margin: .9rem auto .3rem;
      flex-shrink: 0;
    }

    /* header row */
    .modal-header-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .2rem 1.2rem .5rem;
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(.88rem, 3.8vw, 1.05rem);
      color: rgba(242,196,206,.8);
      letter-spacing: .1em;
    }
    .modal-close {
      min-width: 44px; min-height: 44px;
      width: 2.2rem; height: 2.2rem;
      border-radius: 50%;
      border: 1px solid rgba(242,196,206,.3);
      background: rgba(255,255,255,.07);
      color: rgba(242,196,206,.8);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      touch-action: manipulation;
    }
    .modal-close:active { background: rgba(212,96,122,.45); }

    /* ══ 3-D CAROUSEL ══ */
    .wrapper {
      flex: 1;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .inner {
      --w: 110px;
      --h: 160px;
      --translateZ: 200px;
      --rotateX: -12deg;
      --perspective: 820px;
      position: absolute;
      width: var(--w);
      height: var(--h);
      top: calc(50% - var(--h)/2 - 8px);
      left: calc(50% - var(--w)/2);
      transform-style: preserve-3d;
      animation: rotating 16s linear infinite;
    }
    .inner.paused { animation-play-state: paused; }

    @keyframes rotating {
      from { transform: perspective(var(--perspective)) rotateX(var(--rotateX)) rotateY(0); }
      to   { transform: perspective(var(--perspective)) rotateX(var(--rotateX)) rotateY(1turn); }
    }

    .card {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(var(--color-card),.75);
      border-radius: 14px;
      overflow: hidden;
      transform:
        rotateY(calc(90deg * var(--index)))
        translateZ(var(--translateZ));
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
      cursor: pointer;
      touch-action: manipulation;
    }

    .img {
      width: 100%; height: 100%;
      background:
        radial-gradient(circle at 50% 40%,
          rgba(var(--color-card),.22) 0%,
          rgba(var(--color-card),.55) 70%,
          rgba(var(--color-card),.88) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      position: relative;
    }
    .img img {
      position: absolute;
      inset: 0; width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .img img.loaded { display: block; }
    .placeholder-icon {
      font-size: 1.9rem; opacity: .7;
      position: relative; z-index: 1;
    }
    .placeholder-label {
      font-style: italic;
      font-size: .68rem;
      letter-spacing: .08em;
      color: rgba(255,255,255,.78);
      text-align: center;
      line-height: 1.4;
      position: relative; z-index: 1;
    }

    .upload-input { display: none; }

    .carousel-hint {
      flex-shrink: 0;
      padding: .5rem 0 .8rem;
      font-style: italic;
      font-size: clamp(.67rem, 2.7vw, .78rem);
      letter-spacing: .08em;
      color: rgba(242,196,206,.32);
      text-align: center;
    }
    .safe-bottom { height: env(safe-area-inset-bottom, 0px); flex-shrink: 0; }
  </style>
</head>
<body>

<script>
  const emojis = ['🌸','🌹','💕','✨','🌷','💗','💖','🌺'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('span');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.cssText = `left:${Math.random()*100}vw;font-size:${.65+Math.random()*.85}rem;animation-duration:${8+Math.random()*9}s;animation-delay:${Math.random()*10}s;`;
    document.body.appendChild(p);
  }
</script>

<!-- ── main scene ── -->
<div class="scene">
  <p class="label-top">✦ &nbsp; with love &nbsp; ✦</p>

  <div class="flip-card" id="card">
    <div class="flip-card-inner">

      <!-- FRONT -->
      <div class="flip-card-front">
        <div class="front-month">44</div>
        <div class="front-unit">เดือน</div>
        <div class="front-divider"></div>
        <div class="front-emoji">💕</div>
        <div class="front-title">สุขสันต์วัน<br>ครบรอบ</div>
        <div class="front-sub">monthiversary</div>
        <span class="front-hint" id="hintText">แตะเพื่อเปิดการ์ด</span>
      </div>

      <!-- BACK -->
      <div class="flip-card-back">
        <div class="back-ornament">✦ ✦ ✦</div>
        <p class="back-quote">
          "ขอให้เธอมีความสุขมากๆ<br>
          มีความสุขไปด้วยกันนานๆ<br>
          เค้าดีใจที่มีเธอฮ้าา<br>
          รักแฟนๆๆๆๆ"
        </p>
        <div class="back-name">เบบี๋ ❤️</div>
        <div class="back-hearts">💗 &nbsp; 💗 &nbsp; 💗</div>
        <div class="back-sign">— From Napat —</div>
      </div>

    </div>
  </div>

  <p class="caption" id="caption">แตะการ์ดเพื่อพลิก 🌹</p>
</div>

<!-- ══ PHOTO MODAL ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" id="modalBox">

    <div class="modal-handle"></div>

    <div class="modal-header-row">
      <span class="modal-title">our moments 💕</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>

    <div class="wrapper">
  <div class="inner" id="carousel">

    <!-- การ์ด 1 -->
    <div class="card" style="--index:0;--color-card:242,180,196;">
      <div class="img">
        <div style="font-size:2rem;">LOVE</div>
      </div>
    </div>

    <!-- การ์ด 2 -->
    <div class="card" style="--index:1;--color-card:212,96,122;">
      <div class="img">
        <div style="font-size:2rem;">U</div>
      </div>
    </div>

    <!-- การ์ด 3 -->
    <div class="card" style="--index:2;--color-card:249,200,210;">
      <div class="img">
        <div style="font-size:2rem;">ANNA</div>
      </div>
    </div>

    <!-- การ์ด 4 (ใส่รูป) -->
    <div class="card" style="--index:3;--color-card:201,149,76;">
      <div class="img">
        <img src="anna.jpg" style="width:100%;height:100%;object-fit:cover;" />
      </div>
    </div>

  </div>

      <div class="carousel-hint">แตะค้างเพื่อหยุด &nbsp;·&nbsp; แตะการ์ดเพื่อใส่รูป</div>
      <div class="safe-bottom"></div>
    </div>
  </div>

<script>
  const flipCard   = document.getElementById('card');
  const modal      = document.getElementById('modal');
  const modalClose = document.getElementById('modalClose');
  const carousel   = document.getElementById('carousel');
  const hintText   = document.getElementById('hintText');
  const caption    = document.getElementById('caption');

  let flipped = false;

  flipCard.addEventListener('click', () => {
    if (!flipped) {
      // first tap → flip to show message
      flipCard.classList.add('flipped');
      flipped = true;
      caption.textContent = 'แตะอีกครั้งเพื่อดูรูปภาพ 🌹';
    } else {
      // second tap → open photo modal
      modal.classList.add('open');
    }
  });

  /* close modal */
  modalClose.addEventListener('click', e => {
    e.stopPropagation();
    modal.classList.remove('open');
  });
  modal.addEventListener('click', e => {
    if (e.target === modal) modal.classList.remove('open');
  });

  /* swipe down to dismiss */
  let startY = 0;
  const modalBox = document.getElementById('modalBox');
  modalBox.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  modalBox.addEventListener('touchend',   e => {
    if (e.changedTouches[0].clientY - startY > 90) modal.classList.remove('open');
  }, { passive: true });

  /* hold to pause carousel */
  carousel.addEventListener('touchstart', () => carousel.classList.add('paused'),    { passive: true });
  carousel.addEventListener('touchend',   () => carousel.classList.remove('paused'), { passive: true });
  carousel.addEventListener('touchcancel',() => carousel.classList.remove('paused'), { passive: true });

  /* desktop hover pause */
  modalBox.addEventListener('mouseenter', () => carousel.classList.add('paused'));
  modalBox.addEventListener('mouseleave', () => carousel.classList.remove('paused'));

  /* image upload — tap on .img triggers file input */
  document.querySelectorAll('.img[data-target]').forEach(imgDiv => {
    imgDiv.addEventListener('click', e => {
      e.stopPropagation();
      const input = document.getElementById(imgDiv.dataset.target);
      if (input) input.click();
    });
  });

  [0,1,2,3].forEach(i => {
    const input = document.getElementById('up' + i);
    const imgEl = document.getElementById('img' + i);
    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      imgEl.src = URL.createObjectURL(file);
      imgEl.classList.add('loaded');
      imgEl.closest('.img').querySelectorAll('.placeholder-icon,.placeholder-label')
           .forEach(el => el.style.display = 'none');
    });
  });
</script>
</body>
</html>
